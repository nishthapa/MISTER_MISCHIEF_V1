; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = https://github.com/platformio/platform-espressif32.git
board = esp32-s3-devkitc-1
framework = arduino

; -----------------------------------------------------
; 1. UNLOCK THE 16MB FLASH
; Tell the compiler not to stop at the default 4MB limit
; -----------------------------------------------------
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; -----------------------------------------------------
; 2. UNLOCK THE 8MB PSRAM
; The R8 uses "Octal SPI" (opi). If you don't set this, 
; the chip will crash when trying to use the extra RAM.
; -----------------------------------------------------
board_build.arduino.memory_type = qio_opi
build_flags = 
    -DBOARD_HAS_PSRAM

; -----------------------------------------------------
; 3. ENABLE TYPE-C SERIAL (THE "DEAD BOARD" FIX)
; Knockoff S3 boards route serial through the direct USB. 
; If you omit these two lines, your Serial.print() 
; commands will vanish into thin air.
; -----------------------------------------------------
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
; -----------------------------------------------------

; -----------------------------------------------------
; 4. LIBRARY DEPENDENCIES
; -----------------------------------------------------
lib_deps =
    electroniccats/MPU6050 @ ^1.4.4 ; Electronic Cats' MPU6050 library to unlock the DMP features of the IMU.
; -----------------------------------------------------

; -----------------------------------------------------
; 5. SERIAL MONITOR SPEED (BAUD RATE)
; -----------------------------------------------------
monitor_speed = 115200
; -----------------------------------------------------

; -----------------------------------------------------
; 6. CONTINUOUS SERIAL MONITORING PERSISTING RESETS
; -----------------------------------------------------