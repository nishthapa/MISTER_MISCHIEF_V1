; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = https://github.com/platformio/platform-espressif32.git
board = esp32-s3-devkitc-1
framework = arduino

; -----------------------------------------------------
; 1. UNLOCK THE 16MB FLASH
; Tell the compiler not to stop at the default 4MB limit
; -----------------------------------------------------
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; -----------------------------------------------------
; 2. UNLOCK THE 8MB PSRAM
; The R8 uses "Octal SPI" (opi). If you don't set this, 
; the chip will crash when trying to use the extra RAM.
; -----------------------------------------------------
board_build.arduino.memory_type = qio_opi
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=5 ; 0 stops the CPU from logging I2C noise.
    ;-DCONFIG_HEAP_POISONING_COMPREHENSIVE=1

; -----------------------------------------------------
; 3. ENABLE TYPE-C SERIAL (THE "DEAD BOARD" FIX)
; Knockoff S3 boards route serial through the direct USB. 
; If you omit these two lines, your Serial.print() 
; commands will vanish into thin air.
; -----------------------------------------------------
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
; -----------------------------------------------------

; -----------------------------------------------------
; 4. LIBRARY DEPENDENCIES
; -----------------------------------------------------
lib_deps =
    electroniccats/MPU6050 @ ^1.4.4 ; Electronic Cats' MPU6050 library to unlock the DMP features of the IMU.

    ;links2004/WebSockets @ ^2.7.2
    ; 🚨 THE FIX: Pull the master branch directly from GitHub to fix the ESP32-S3 Hardware Crypto Crash!
    https://github.com/links2004/arduinoWebSockets.git#master

    teckel12/NewPing @ ^1.9.7 ; teckel12 NON-BLOCKING Sonar library that uses the hardware stopwatch instead of pulseIn()

    h2zero/NimBLE-Arduino@^2.5.0 ; NimBLE-Arduino for Bluetooth Low Energy support, used for the phone control mode.

    https://github.com/xreef/MPU-9250-DMP_Library.git ; DMP for the MPU9250 (i.e. MPU6500 + AK8963 combo board)
; -----------------------------------------------------

; -----------------------------------------------------
; 5. SERIAL MONITOR SPEED (BAUD RATE)
; -----------------------------------------------------
monitor_speed = 115200
; -----------------------------------------------------

; -----------------------------------------------------
; or 6. LOW LEVEL EXCEPTION DECODER
; If your ESP32 crashes, this will help you decode the error messages.
; -----------------------------------------------------
monitor_filters = esp32_exception_decoder
build_type = debug

; -----------------------------------------------------
; 7. OTA FLASHING
; -----------------------------------------------------
; Add these two lines!
;upload_protocol = espota
;upload_port = 192.168.1.4  ; <--- Change this to Mister Mischief's IP
; -----------------------------------------------------

; -----------------------------------------------------
; 8. HW Debugging flags using the internal S3 USB-JTAG engine
; -----------------------------------------------------
; debug_tool = esp-builtin
; upload_protocol = esp-builtin
; Force a much slower, safer clock speed to prevent packet drops
; debug_speed = 4000

; Optional: Halts code execution immediately at the start of your loop task.
; Remove or comment out this line if you prefer it to run continuously until it hits your breakpoints.
; debug_init_break = tbreak loop

; Give OpenOCD and GDB extra time to latch onto the target before timing out
; debug_server_ready_pattern = Listening on port
; debug_init_break = tbreak setup